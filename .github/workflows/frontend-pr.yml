name: Frontend PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "frontend/**"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify generated build artifacts are committed
        run: |
          if [[ -n "$(git -C .. status --porcelain -- frontend/dist)" ]]; then
            echo "frontend/dist is out of date. Run 'cd frontend && npm run build' and commit the updated build output."
            git -C .. status --short -- frontend/dist
            exit 1
          fi
